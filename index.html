<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation Stuben</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* --------------------------------------------------
   DEIN STYLE (gekürzt, nur relevante Teile)
-------------------------------------------------- */

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: Arial, sans-serif;
  padding: 20px;
}

/* HEADER */
.top-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.weather-icon-box img {
  width: 80px;
  height: 80px;
}

/* LIVE ICON PULSE */
#liveIcon {
  background: #ffffff;
  border-radius: 16px;
  padding: 6px;
  box-shadow: 0 0 0 0 rgba(255,165,0,0.6);
  animation: pulse 2.2s infinite ease-in-out;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(255,165,0,0.6); transform: scale(1); }
  50%  { box-shadow: 0 0 12px 12px rgba(255,165,0,0); transform: scale(1.06); }
  100% { box-shadow: 0 0 0 0 rgba(255,165,0,0.6); transform: scale(1); }
}

/* SUN ANIMATION */
.sun-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin: 20px 0;
  text-align: center;
}

.sunrise-icon, .sunset-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #ffd54f;
}

.sunrise-time, .sunset-time {
  margin-top: 6px;
  font-size: 1.25rem;
  color: #ffd54f;
  text-shadow: 0 0 6px #ffd54f;
}

/* Sunrise Animation */
.sun {
  animation: sunriseMotion 3.4s cubic-bezier(0.55, 0.03, 0.29, 0.99) infinite alternate;
}

@keyframes sunriseMotion {
  0%   { transform: translateY(16px) scale(0.94); }
  35%  { transform: translateY(4px)  scale(1.03); }
  55%  { transform: translateY(-2px) scale(1.00); }
  100% { transform: translateY(-8px) scale(1.00); }
}

/* Sunset Animation */
.sunset-sun {
  animation: sunsetMotion 3.4s cubic-bezier(0.55, 0.03, 0.29, 0.99) infinite alternate;
}

@keyframes sunsetMotion {
  0%   { transform: translateY(-8px) scale(1.00); }
  35%  { transform: translateY(-2px) scale(1.03); }
  55%  { transform: translateY(4px)  scale(1.00); }
  100% { transform: translateY(16px) scale(0.94); }
}

/* Glow Pulse */
.sunrise-icon svg,
.sunset-icon svg {
  stroke: #ffd54f !important;
  animation: glowPulse 3.4s ease-in-out infinite alternate;
}

@keyframes glowPulse {
  0%   { filter: drop-shadow(0 0 2px #ffd54f) brightness(1); }
  40%  { filter: drop-shadow(0 0 7px #ffd54f) brightness(1.25); }
  60%  { filter: drop-shadow(0 0 10px #ffd54f) brightness(1.35); }
  100% { filter: drop-shadow(0 0 4px #ffd54f) brightness(1.1); }
}

</style>
</head>

<body>

<!-- --------------------------------------------------
     HEADER
-------------------------------------------------- -->
<header class="top-header">
  <div class="title-box">
    <div class="main-title">Wetterstation Stuben</div>
    <div class="sub-title">Martin Huber</div>
  </div>

  <div class="weather-icon-box">
    <img src="https://openweathermap.org/img/wn/01d@2x.png" id="liveIcon">
  </div>
</header>

<h2>Live Wetter</h2>
<div id="live"></div>

<h2>Sonne</h2>

<div class="sun-container">

    <!-- SUNRISE -->
    <div class="sunrise-icon">
        <svg class="sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="14" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
            <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
            <line x1="2" y1="14" x2="6" y2="14"></line>
            <line x1="18" y1="14" x2="22" y2="14"></line>
            <polyline points="8 17 12 21 16 17"></polyline>
        </svg>
        <div id="sunriseText" class="sunrise-time"></div>
    </div>

    <!-- SUNSET -->
    <div class="sunset-icon">
        <svg class="sunset-sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
            <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
            <line x1="2" y1="14" x2="6" y2="14"></line>
            <line x1="18" y1="14" x2="22" y2="14"></line>
            <polyline points="16 17 12 21 8 17"></polyline>
        </svg>
        <div id="sunsetText" class="sunset-time"></div>
    </div>

</div>

<h2>Wochentemperatur</h2>
<canvas id="weekChart" height="120"></canvas>

<h2>Monatstemperatur</h2>
<canvas id="monthChart" height="120"></canvas>

<h2>Jahrestemperatur</h2>
<canvas id="yearChart" height="120"></canvas>

<h2>Wind</h2>
<canvas id="windChart" height="120"></canvas>

<h2>Regen</h2>
<canvas id="rainChart" height="120"></canvas>

<h2>Windrose</h2>
<canvas id="windRose" height="200"></canvas>

<script>
/* --------------------------------------------------
   FIREBASE INIT
-------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.appspot.com",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);
firebase.auth().signInAnonymously();

/* --------------------------------------------------
   LIVE
-------------------------------------------------- */
function loadLive() {
  firebase.database().ref("weather/live").on("value", snap => {
    const e = snap.val();
    if (!e) return;

    const time = new Date(e.timestamp * 1000).toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const icon = document.getElementById("liveIcon");

    // -----------------------------------------
    // ICON AUS OPENWEATHER LADEN
    // -----------------------------------------
    firebase.database().ref("weather/openweather/icon").once("value", iconSnap => {
      const owIcon = iconSnap.val();

      // Fallback, falls kein Icon vorhanden
      const iconCode = owIcon || "04d";

      // Bild setzen
      icon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

      // -----------------------------------------
      // WETTER-ANIMATION
      // -----------------------------------------
      icon.className = ""; // Reset

      if (iconCode.startsWith("01")) icon.classList.add("icon-sun");
      else if (iconCode.startsWith("02") || iconCode.startsWith("03") || iconCode.startsWith("04"))
          icon.classList.add("icon-cloud");
      else if (iconCode.startsWith("09") || iconCode.startsWith("10"))
          icon.classList.add("icon-rain");
      else if (iconCode.startsWith("13"))
          icon.classList.add("icon-snow");
      else if (iconCode.startsWith("11"))
          icon.classList.add("icon-storm");
      else if (iconCode.endsWith("n"))
          icon.classList.add("icon-night");
    });

    // -----------------------------------------
    // LIVE-WERTE
    // -----------------------------------------
    document.getElementById("live").innerHTML = `
      <b>${e.temp.toFixed(1)}°C</b><br>
      Feuchte: ${e.humidity}%<br>
      Druck: ${e.pressure} hPa<br>
      Wind: ${e.wind} km/h aus ${e.winddir}°<br>
      Regen (1h): ${e.rain} mm<br>
      Wolken: ${e.clouds}%<br>
      Stand: ${time}
    `;
  });
}
/* --------------------------------------------------
   SUN
-------------------------------------------------- */
function startSun() {
  firebase.database().ref("weather/sun").on("value", snap => {
    const s = snap.val();
    if (!s) return;

    const sunrise = new Date(s.sunrise * 1000).toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const sunset = new Date(s.sunset * 1000).toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    document.getElementById("sunriseText").textContent = sunrise;
    document.getElementById("sunsetText").textContent = sunset;
  });
}

/* --------------------------------------------------
   HISTORY + CHARTS
-------------------------------------------------- */
function linearRegression(yValues) {
  const n = yValues.length;
  if (n < 2) return null;

  const x = [...Array(n).keys()];
  const y = yValues;

  const sumX = x.reduce((a,b)=>a+b,0);
  const sumY = y.reduce((a,b)=>a+b,0);
  const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
  const sumXX = x.reduce((a,b)=>a + b*b, 0);

  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;

  return x.map(i => slope * i + intercept);
}

function minLine(values) {
  const min = Math.min(...values);
  return values.map(() => min);
}

function drawChart(id, labels, data, title) {
  const ctx = document.getElementById(id);

  const trend = linearRegression(data) || data;
  const minL = minLine(data);

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: title,
          data,
          borderColor: "#ffffff",
          backgroundColor: "rgba(255,255,255,0.1)",
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: "Trend",
          data: trend,
          borderColor: "#00ff88",
          borderWidth: 2,
          borderDash: [6, 6],
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: "Minimum",
          data: minL,
          borderColor: "#ff4444",
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}

/* --------------------------------------------------
   HISTORY LISTENER
-------------------------------------------------- */
function startHistory() {
  firebase.database().ref("weather/history").on("value", snap => {
    const data = snap.val();
    if (!data) return;

    const now = Date.now() / 1000;

    const weekLabels = [];
    const weekTemps = [];

    const monthLabels = [];
    const monthTemps = [];

    const yearLabels = [];
    const yearTemps = [];

    const windLabels = [];
    const windValues = [];

    const rainLabels = [];
    const rainValues = [];

    const windDirValues = [];

    for (const k in data) {
      const e = data[k];
      const age = now - e.ts;
      const date = new Date(e.ts * 1000);

      if (age <= 7 * 86400) {
        weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
        weekTemps.push(e.temp);
      }

      if (age <= 30 * 86400) {
        monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
        monthTemps.push(e.temp);
      }

      if (age <= 365 * 86400) {
        yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
        yearTemps.push(e.temp);
      }

      windLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
      windValues.push(e.wind);

      rainLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
      rainValues.push(e.rain);

      windDirValues.push(e.winddir);
    }

    drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
    drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
    drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");

    drawChart("windChart", windLabels, windValues, "Wind (km/h)");
    drawChart("rainChart", rainLabels, rainValues, "Regen (mm)");

    drawWindRose(windDirValues);
  });
}

/* --------------------------------------------------
   WINDROSE
-------------------------------------------------- */
function drawWindRose(windDirections) {
  const counts = new Array(8).fill(0);

  windDirections.forEach(dir => {
    const index = Math.floor((dir % 360) / 45);
    counts[index]++;
  });

  new Chart(document.getElementById("windRose"), {
    type: "polarArea",
    data: {
      labels: ["N","NO","O","SO","S","SW","W","NW"],
      datasets: [{
        data: counts,
        backgroundColor: [
          "#4ea3ff","#6ec6ff","#ffd966","#ff8c42",
          "#ff4d4d","#d9534f","#5bc0de","#5cb85c"
        ]
      }]
    },
    options: {
      scales: { r: { ticks: { color: "#e6edf3" } } },
      plugins: { legend: { labels: { color: "#e6edf3" } } }
    }
  });
}

/* --------------------------------------------------
   START
-------------------------------------------------- */
window.onload = function() {
  loadLive();
  startSun();
  startHistory();
};
</script>

</body>
</html>
