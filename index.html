<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meine Wetterstation</title>
</head>
<body>
  <h1>Live</h1>
  <div id="live-temp"></div>
  <div id="live-hum"></div>
  <div id="live-pres"></div>

  <h2>Vorhersage (nächste Stunden)</h2>
  <div id="forecast-hours"></div>

  <h2>5-Tage-Vorhersage</h2>
  <div id="forecast-days"></div>

  <script type="module">
    // Firebase SDKs per <script> oder bundler einbinden
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "DEIN_API_KEY",
      authDomain: "DEIN_PROJEKT.firebaseapp.com",
      databaseURL: "https://DEIN_PROJEKT-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "DEIN_PROJEKT",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Live
    onValue(ref(db, "weather/live"), snap => {
      const d = snap.val();
      document.getElementById("live-temp").textContent = `Temp: ${d.temperatur} °C`;
      document.getElementById("live-hum").textContent  = `Feuchte: ${d.feuchtigkeit} %`;
      document.getElementById("live-pres").textContent = `Druck: ${d.druck} hPa`;
    });

    // Stunden-forecast
    onValue(ref(db, "weather/forecast/stunden"), snap => {
      const data = snap.val();
      const container = document.getElementById("forecast-hours");
      container.innerHTML = "";
      Object.keys(data).forEach(k => {
        const e = data[k];
        const div = document.createElement("div");
        div.textContent = `${e.timestamp}: ${e.temperatur} °C, ${e.icon}`;
        container.appendChild(div);
      });
    });

    // Daily-forecast
    onValue(ref(db, "weather/forecast_daily"), snap => {
      const data = snap.val();
      const container = document.getElementById("forecast-days");
      container.innerHTML = "";
      Object.keys(data).forEach(k => {
        const e = data[k];
        const div = document.createElement("div");
        div.textContent = `${e.datum}: ${e.t_min}–${e.t_max} °C, ${e.icon}`;
        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
