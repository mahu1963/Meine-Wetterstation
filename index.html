<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Wetterstation Bernstein</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0b1020; color:#f5f5f5; margin:0; }
    .container { max-width:900px; margin:20px auto; padding:20px; }
    h1 { margin-bottom:10px; }
    .current-box {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 20px; border-radius:16px;
      background:linear-gradient(135deg,#1f2a3d,#283854);
      margin-bottom:20px;
    }
    .current-value { font-size:3rem; font-weight:600; }
    .current-value .unit { font-size:1.4rem; margin-left:4px; opacity:.8; }
    .current-sub { display:flex; flex-direction:column; gap:4px; font-size:.95rem; opacity:.9; }
    .minmax-row { display:flex; gap:16px; margin:20px 0; flex-wrap:wrap; }
    .minmax-card, .stats-card {
      flex:1 1 220px; padding:14px 16px; border-radius:14px;
      background:#151b2b; box-shadow:0 8px 20px rgba(0,0,0,.35);
      font-size:.95rem;
    }
    .stats-grid { display:flex; gap:16px; flex-wrap:wrap; margin:20px 0; }
    canvas { background:#111624; border-radius:12px; padding:8px; }
  </style>
</head>

<body>
<div class="container">

 <div style="text-align:center; margin-bottom:20px;">
  <h1 style="margin:0; font-size:2.6rem;">Wetterstation-Stuben</h1>
  <div style="font-size:2.3rem; margin-top:10px; opacity:0.9;">
    Martin Huber
  </div>
</div>
  
  <!-- LIVE (ESP32) -->
  <div class="current-box">
    <div>
      <div class="current-value">
        <span id="live-temp">--.-</span><span class="unit">°C</span>
      </div>
      <div class="current-sub">
        <span>Luftfeuchte: <b id="live-hum">--</b>%</span>
        <span>Luftdruck: <b id="live-pres">----</b> hPa</span>
        <span id="timestamp">Stand: --</span>
      </div>
    </div>
    <img id="icon-top" src="" width="80" alt="Wetter-Icon">
  </div>

<!-- SUNRISE -->
<div class="sunrise-icon">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <g class="sun">
      <path d="M12 12a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4z" />
    </g>
    <path d="M12 2v6" />
    <path d="M5.2 9.2l2.8 2.8" />
    <path d="M18.8 9.2l-2.8 2.8" />
    <path d="M4 16h16" />
    <path d="M7 20h10" />
  </svg>

  <div id="ow-sunrise" class="sunrise-time">--:--</div>
</div>

<!-- OPENWEATHER BOX -->
<div class="minmax-row">
  <div class="minmax-card">
    <h2>OpenWeather</h2>
    <p>Temp: <b id="ow-temp">--.-</b> °C</p>
    <p>Feuchte: <b id="ow-humidity">--</b>%</p>
    <p>Druck: <b id="ow-pressure">--</b> hPa</p>
    <p>Wind: <b id="ow-wind">--</b> m/s</p>
    <p>Wolken: <b id="ow-clouds">--</b>%</p>
    <p>Zeit: <b id="ow-time">--</b></p>
    <p>Beschreibung: <b id="ow-desc">--</b></p>
    <img id="ow-icon" width="60" alt="Wetter-Symbol">
  </div>
</div>
  


  <!-- CHARTS -->
  <h2>Verlauf (Woche)</h2>
  <canvas id="chartWeek" height="120"></canvas>

  <h2>Verlauf (Jahr)</h2>
  <canvas id="chartYear" height="120"></canvas>

  <!-- MONAT / JAHR STATS -->
  <div class="stats-grid">
    <div class="stats-card">
      <h3>Monat</h3>
      <p>Min: <b id="minMonth">-</b></p>
      <p>Max: <b id="maxMonth">-</b></p>
      <p>Ø: <b id="avgMonth">-</b></p>
    </div>
    <div class="stats-card">
      <h3>Jahr</h3>
      <p>Min: <b id="minYear">-</b></p>
      <p>Max: <b id="maxYear">-</b></p>
      <p>Ø: <b id="avgYear">-</b></p>
    </div>
  </div>

</div>

<script src="chart.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
