<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    padding: 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.section {
    margin-top: 30px;
}

.box {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.forecast-container {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.forecast-box {
    background: #161b22;
    padding: 10px;
    border-radius: 10px;
    width: 80px;
    text-align: center;
}

canvas {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1 id="temp">--.- °C</h1>
<div id="details">Feuchte: -- % &nbsp;&nbsp; Druck: ---- hPa</div>
<div id="time">Stand: --:--</div>

<div class="section box">
    <h2>Verlauf / Statistik</h2>
    <div>Woche (Ø Temp): <span id="weekAvg">--.- °C</span></div>
    <div>Monat (Ø Temp): <span id="monthAvg">--.- °C</span></div>
    <div>Jahr (Ø Temp): <span id="yearAvg">--.- °C</span></div>
    <div>Sonnenaufgang: <span id="sunrise">--:--</span></div>
    <div>Sonnenuntergang: <span id="sunset">--:--</span></div>
</div>

<div class="section">
    <h2>Vorhersage (5 Stunden)</h2>
    <div class="forecast-container" id="forecast"></div>
</div>

<h2>Wochenverlauf</h2>
<canvas id="weekChart"></canvas>

<h2>Monatsverlauf</h2>
<canvas id="monthChart"></canvas>

<h2>Jahresverlauf</h2>
<canvas id="yearChart"></canvas>

<script>
// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.firebasestorage.app",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

// ---------------- LIVE-DATEN ----------------
function loadLive() {
    firebase.database().ref("weather/live").on("value", snap => {
        const d = snap.val();
        if (!d) return;

        document.getElementById("temp").innerText = d.temp.toFixed(1) + " °C";
        document.getElementById("details").innerText =
            "Feuchte: " + d.humidity + " %   Druck: " + d.pressure + " hPa";

        const t = new Date(d.timestamp * 1000);
        document.getElementById("time").innerText =
            "Stand: " + t.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    });
}

// ---------------- STATISTIK ----------------
function loadStats() {
    firebase.database().ref("weather/stats").on("value", snap => {
        const d = snap.val();
        if (!d) return;
        document.getElementById("weekAvg").innerText = d.weekAvg ? d.weekAvg.toFixed(1) + " °C" : "--.- °C";
        document.getElementById("monthAvg").innerText = d.monthAvg ? d.monthAvg.toFixed(1) + " °C" : "--.- °C";
        document.getElementById("yearAvg").innerText = d.yearAvg ? d.yearAvg.toFixed(1) + " °C" : "--.- °C";
    });

    firebase.database().ref("weather/sun").on("value", snap => {
        const d = snap.val();
        if (!d) return;
        document.getElementById("sunrise").innerText = d.sunrise;
        document.getElementById("sunset").innerText = d.sunset;
    });
}

// ---------------- FORECAST ----------------
function loadForecast() {
    firebase.database().ref("weather/forecast/5h").on("value", snap => {
        const data = snap.val();
        if (!data) return;

        const container = document.getElementById("forecast");
        container.innerHTML = "";

        for (let i = 0; i < 5; i++) {
            const f = data[i];
            if (!f) continue;

            const box = document.createElement("div");
            box.className = "forecast-box";

            box.innerHTML = `
                <img src="https://openweathermap.org/img/wn/${f.icon}.png">
                <div>${f.temp.toFixed(1)}°C</div>
                <div>${f.time || ""}</div>
            `;

            container.appendChild(box);
        }
    });
}

// ---------------- CHART FUNCTION ----------------
function drawChart(canvasId, labels, data, title) {
    new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: title,
                data: data,
                borderColor: "#4ea3ff",
                backgroundColor: "rgba(78,163,255,0.2)",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });
}

// ---------------- HISTORY: WEEK ----------------
function loadWeekChart() {
    firebase.database().ref("weather/history/week").once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
            temps.push(data[ts].temp);
        }

        drawChart("weekChart", labels, temps, "Wochentemperatur");
    });
}

// ---------------- HISTORY: MONTH ----------------
function loadMonthChart() {
    firebase.database().ref("weather/history/month").once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleDateString("de-DE"));
            temps.push(data[ts].temp);
        }

        drawChart("monthChart", labels, temps, "Monatstemperatur");
    });
}

// ---------------- HISTORY: YEAR ----------------
function loadYearChart() {
    firebase.database().ref("weather/history/year").once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleDateString("de-DE", { month: "short" }));
            temps.push(data[ts].temp);
        }

        drawChart("yearChart", labels, temps, "Jahrestemperatur");
    });
}

// ---------------- START ----------------
window.onload = function() {
    loadLive();
    loadStats();
    loadForecast();
    loadWeekChart();
    loadMonthChart();
    loadYearChart();
};
</script>

</body>
</html>
