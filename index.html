<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Wetterstation</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Wetterstation</h1>

  <!-- LIVE BOX -->
  <div class="current-box">
    <div>
      <div class="current-value">
        <span id="live-temp">--.-</span><span class="unit">°C</span>
      </div>

      <div class="current-sub">
        <span>Luftfeuchte: <b id="live-hum">--</b>%</span>
        <span>Luftdruck: <b id="live-pres">----</b> hPa</span>
        <span id="timestamp">Stand: --</span>
      </div>
    </div>

    <img id="icon-top" src="" width="80">
  </div>

  <!-- SUNRISE / SUNSET -->
  <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <img id="sunrise-icon" width="40">
      <span id="ow-sunrise">--:--</span>
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <img id="sunset-icon" width="40">
      <span id="ow-sunset">--:--</span>
    </div>
  </div>

  <!-- OPENWEATHER BOX -->
  <div class="minmax-row">
    <div class="minmax-card">
      <h2>OpenWeather</h2>
      <p>Temp: <b id="ow-temp">--.-</b> °C</p>
      <p>Feuchte: <b id="ow-humidity">--</b>%</p>
      <p>Druck: <b id="ow-pressure">--</b> hPa</p>
      <p>Wind: <b id="ow-wind">--</b> m/s</p>
      <p>Wolken: <b id="ow-clouds">--</b>%</p>
      <p>Zeit: <b id="ow-time">--</b></p>
      <p>Beschreibung: <b id="ow-desc">--</b></p>
      <img id="ow-icon" width="60">
    </div>
  </div>

  <!-- CHARTS -->
  <h2>Verlauf (Woche)</h2>
  <canvas id="chartWeek" height="120"></canvas>

  <h2>Verlauf (Jahr)</h2>
  <canvas id="chartYear" height="120"></canvas>

  <!-- MONTH/YEAR STATS -->
  <div class="stats-grid">
    <div class="stats-card">
      <h3>Monat</h3>
      <p>Min: <b id="minMonth">-</b></p>
      <p>Max: <b id="maxMonth">-</b></p>
      <p>Ø: <b id="avgMonth">-</b></p>
    </div>

    <div class="stats-card">
      <h3>Jahr</h3>
      <p>Min: <b id="minYear">-</b></p>
      <p>Max: <b id="maxYear">-</b></p>
      <p>Ø: <b id="avgYear">-</b></p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
