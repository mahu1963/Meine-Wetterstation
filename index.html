<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation – Stuben Martin Huber</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    padding: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #6ec6ff 0%, #2a66c7 40%, #0a1a33 100%);
    padding: 35px 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    color: white;
}

.header-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

.header-main-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-main-left {
    text-align: left;
}

.header-main-right {
    text-align: right;
    font-size: 16px;
}

.header-temp {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
}

.header-details {
    font-size: 18px;
    margin-bottom: 5px;
}

.header-time {
    font-size: 16px;
    margin-bottom: 10px;
}

.header-sun-line {
    margin: 3px 0;
}

/* STATISTIK BOX */
.box {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* FORECAST */
.forecast-container {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.forecast-box {
    background: #161b22;
    padding: 10px;
    border-radius: 10px;
    width: 80px;
    text-align: center;
}

/* CHARTS */
canvas {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">Wetterstation – Stuben Martin Huber</div>

    <div class="header-main-row">
        <div class="header-main-left">
            <div class="header-temp" id="temp">--.- °C</div>
            <div class="header-details" id="details">Feuchte: -- %   Druck: ---- hPa</div>
            <div class="header-time" id="time">Stand: --:--</div>
        </div>

        <div class="header-main-right">
            <div class="header-sun-line">Sonnenaufgang: <span id="sunrise">--:--</span></div>
            <div class="header-sun-line">Sonnenuntergang: <span id="sunset">--:--</span></div>
        </div>
    </div>
</div>

<!-- STATISTIK -->
<div class="box">
    <h2>Verlauf / Statistik</h2>
    <div>Woche (Ø Temp): <span id="weekAvg">--.- °C</span></div>
    <div>Monat (Ø Temp): <span id="monthAvg">--.- °C</span></div>
    <div>Jahr (Ø Temp): <span id="yearAvg">--.- °C</span></div>
</div>

<!-- FORECAST -->
<h2>Vorhersage (5 Stunden)</h2>
<div class="forecast-container" id="forecast"></div>

<!-- CHARTS -->
<h2>Wochenverlauf</h2>
<canvas id="weekChart"></canvas>

<h2>Monatsverlauf</h2>
<canvas id="monthChart"></canvas>

<h2>Jahresverlauf</h2>
<canvas id="yearChart"></canvas>

<script>
// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.firebasestorage.app",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

// ---------------- LIVE-DATEN (ESP schreibt nach /live) ----------------
function loadLive() {
    firebase.database().ref("live").on("value", snap => {
        const d = snap.val();
        if (!d) return;

        document.getElementById("temp").innerText = d.temp.toFixed(1) + " °C";
        document.getElementById("details").innerText =
            "Feuchte: " + d.humidity.toFixed(1) + " %   Druck: " + d.pressure.toFixed(1) + " hPa";

        const ts = d.timestamp < 2000000000 ? d.timestamp * 1000 : d.timestamp;
        const t = new Date(ts);

        document.getElementById("time").innerText =
            "Stand: " + t.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    });
}

// ---------------- SUN ----------------
firebase.database().ref("sun").on("value", snap => {
    const d = snap.val();
    if (!d) return;
    document.getElementById("sunrise").innerText = d.sunrise;
    document.getElementById("sunset").innerText = d.sunset;
});

// ---------------- STATISTIK ----------------
function loadStats() {
    firebase.database().ref("stats").on("value", snap => {
        const d = snap.val();
        if (!d) return;

        document.getElementById("weekAvg").innerText = d.weekAvg ? d.weekAvg.toFixed(1) + " °C" : "--.- °C";
        document.getElementById("monthAvg").innerText = d.monthAvg ? d.monthAvg.toFixed(1) + " °C" : "--.- °C";
        document.getElementById("yearAvg").innerText = d.yearAvg ? d.yearAvg.toFixed(1) + " °C" : "--.- °C";
    });
}

// ---------------- FORECAST (optional) ----------------
function loadForecast() {
    firebase.database().ref("forecast/5h").on("value", snap => {
        const data = snap.val();
        if (!data) return;

        const container = document.getElementById("forecast");
        container.innerHTML = "";

        for (let i = 0; i < 5; i++) {
            const f = data[i];
            if (!f) continue;

            const box = document.createElement("div");
            box.className = "forecast-box";

            box.innerHTML = `
                <img src="https://openweathermap.org/img/wn/${f.icon}.png">
                <div>${f.temp.toFixed(1)}°C</div>
                <div>${f.time || ""}</div>
            `;

            container.appendChild(box);
        }
    });
}

// ---------------- CHART FUNCTION ----------------
function drawChart(canvasId, labels, data, title) {
    new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: title,
                data: data,
                borderColor: "#4ea3ff",
                backgroundColor: "rgba(78,163,255,0.2)",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true
        }
    });
}

// ---------------- HISTORY CHARTS ----------------
function loadWeekChart() {
    firebase.database().ref("history/week").once("value", snap => {
        const data = snap.val();
        if (!data) return;

        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(Number(ts)).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
            temps.push(data[ts].temp);
        }

        drawChart("weekChart", labels, temps, "Wochentemperatur");
    });
}

function loadMonthChart() {
    firebase.database().ref("history/month").once("value", snap => {
        const data = snap.val();
        if (!data) return;

        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(Number(ts)).toLocaleDateString("de-DE"));
            temps.push(data[ts].temp);
        }

        drawChart("monthChart", labels, temps, "Monatstemperatur");
    });
}

function loadYearChart() {
    firebase.database().ref("history/year").once("value", snap => {
        const data = snap.val();
        if (!data) return;

        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(Number(ts)).toLocaleDateString("de-DE", { month: "short" }));
            temps.push(data[ts].temp);
        }

        drawChart("yearChart", labels, temps, "Jahrestemperatur");
    });
}

// ---------------- START ----------------
window.onload = function() {
    loadLive();
    loadStats();
    loadForecast();
    loadWeekChart();
    loadMonthChart();
    loadYearChart();
};
</script>

</body>
</html>
