<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Wetterstation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Chart.js (CDN, damit kein 404) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body { background:#0d1117; color:#e6edf3; font-family:Arial; margin:20px; }
  .forecast-box {
    display:inline-block; width:80px; padding:10px; margin:5px;
    background:#161b22; border-radius:8px; text-align:center;
  }
</style>
</head>

<body>

<h1>Meine Wetterstation</h1>

<!-- LIVE -->
<div>
  <h2>Live</h2>
  <img id="liveIcon" width="80">
  <div id="temp">--.- °C</div>
  <div id="details"></div>
  <div id="wind"></div>
  <div id="rain"></div>
  <div id="clouds"></div>
  <div id="time"></div>
</div>

<!-- SONNE -->
<div>
  <h2>Sonne</h2>
  Sonnenaufgang: <span id="sunrise">--:--</span><br>
  Sonnenuntergang: <span id="sunset">--:--</span>
</div>

<!-- FORECAST KACHELN -->
<h2>Vorhersage (5 Stunden)</h2>
<div id="forecast"></div>

<!-- FORECAST DIAGRAMM -->
<h2>Vorhersage Diagramm</h2>
<canvas id="forecastChart" height="120"></canvas>

<!-- HISTORY -->
<h2>Wochentemperatur</h2>
<canvas id="weekChart" height="120"></canvas>

<h2>Monatstemperatur</h2>
<canvas id="monthChart" height="120"></canvas>

<h2>Jahrestemperatur</h2>
<canvas id="yearChart" height="120"></canvas>

<h2>Wind</h2>
<canvas id="windChart" height="120"></canvas>

<h2>Regen</h2>
<canvas id="rainChart" height="120"></canvas>

<h2>Windrose</h2>
<canvas id="windRose" height="200"></canvas>

<script>
/* --------------------------------------------------
   Firebase Init
-------------------------------------------------- */
firebase.initializeApp({
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.firebasestorage.app",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
});

/* --------------------------------------------------
   ANONYMER LOGIN
-------------------------------------------------- */
firebase.auth().signInAnonymously()
  .then(() => console.log("Web anonym eingeloggt"))
  .catch(err => console.error("Login Fehler:", err));

/* --------------------------------------------------
   LIVE-DATEN
-------------------------------------------------- */
function loadLive() {
  firebase.database().ref("weather/live").on("value", snap => {
    const d = snap.val();
    if (!d) return;

    document.getElementById("temp").innerText =
      d.temp?.toFixed ? d.temp.toFixed(1) + " °C" : "--.- °C";

    document.getElementById("details").innerText =
      `Feuchte: ${d.humidity}%   Druck: ${d.pressure} hPa`;

    document.getElementById("wind").innerText =
      `Wind: ${d.wind} km/h aus ${d.winddir}°`;

    document.getElementById("rain").innerText =
      `Regen (1h): ${d.rain} mm`;

    document.getElementById("clouds").innerText =
      `Wolken: ${d.clouds}%`;

    const t = new Date(d.timestamp * 1000);
    document.getElementById("time").innerText =
      "Stand: " + t.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

    const icon = d.icon || "01d";
    document.getElementById("liveIcon").src =
      `https://openweathermap.org/img/wn/${icon}@2x.png`;
  });
}

/* --------------------------------------------------
   SONNE
-------------------------------------------------- */
firebase.database().ref("weather/sun").on("value", snap => {
  const d = snap.val();
  if (!d) return;

  document.getElementById("sunrise").innerText =
    new Date(d.sunrise * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

  document.getElementById("sunset").innerText =
    new Date(d.sunset * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
});

/* --------------------------------------------------
   FORECAST KACHELN (5h)
-------------------------------------------------- */
firebase.database().ref("weather/forecast/5h").on("value", snap => {
  const arr = snap.val();
  if (!arr) return;

  const box = document.getElementById("forecast");
  box.innerHTML = "";

  arr.forEach(item => {
    const icon = item.icon || "01d";
    const t = new Date(item.ts * 1000);
    const hour = t.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

    box.innerHTML += `
      <div class="forecast-box">
        <img src="https://openweathermap.org/img/wn/${icon}@2x.png">
        <div>${item.temp.toFixed(1)}°C</div>
        <div>${hour}</div>
      </div>
    `;
  });
});

/* --------------------------------------------------
   FORECAST DIAGRAMM
-------------------------------------------------- */
let forecastChart = null;

function drawForecastChart(data) {
  const labels = data.map(e => {
    const t = new Date(e.ts * 1000);
    return t.toLocaleTimeString("de-DE", { hour: "2-digit" });
  });

  const temps = data.map(e => e.temp);

  const icons = data.map(e => {
    const iconCode = e.icon || "01d";
    const img = new Image();
    img.src = `https://openweathermap.org/img/wn/${iconCode}.png`;
    img.onload = () => forecastChart?.update();
    return img;
  });

  const ctx = document.getElementById("forecastChart");

  if (forecastChart) forecastChart.destroy();

  forecastChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Temperatur",
        data: temps,
        borderColor: "#4ea3ff",
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 14,
        pointStyle: icons
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}

/* --------------------------------------------------
   HISTORY
-------------------------------------------------- */
function linearRegression(yValues) {
  const n = yValues.length;
  if (n < 2) return null;

  const x = [...Array(n).keys()];
  const y = yValues;

  const sumX = x.reduce((a,b)=>a+b,0);
  const sumY = y.reduce((a,b)=>a+b,0);
  const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
  const sumXX = x.reduce((a,b)=>a + b*b, 0);

  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;

  return x.map(i => slope * i + intercept);
}

function minLine(values) {
  const min = Math.min(...values);
  return values.map(() => min);
}

function drawChart(id, labels, data, title) {
  const ctx = document.getElementById(id);

  const trend = linearRegression(data) || data;
  const minL = minLine(data);

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: title,
          data,
          borderColor: "#ffffff",
          backgroundColor: "rgba(255,255,255,0.1)",
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: "Trend",
          data: trend,
          borderColor: "#00ff88",
          borderWidth: 2,
          borderDash: [6, 6],
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: "Minimum",
          data: minL,
          borderColor: "#ff4444",
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}

/* --------------------------------------------------
   WINDROSE
-------------------------------------------------- */
function drawWindRose(windDirections) {
  const counts = new Array(8).fill(0);

  windDirections.forEach(dir => {
    const index = Math.floor((dir % 360) / 45);
    counts[index]++;
  });

  new Chart(document.getElementById("windRose"), {
    type: "polarArea",
    data: {
      labels: ["N","NO","O","SO","S","SW","W","NW"],
      datasets: [{
        data: counts,
        backgroundColor: [
          "#4ea3ff","#6ec6ff","#ffd966","#ff8c42",
          "#ff4d4d","#d9534f","#5bc0de","#5cb85c"
        ]
      }]
    },
    options: {
      scales: { r: { ticks: { color: "#e6edf3" } } },
      plugins: { legend: { labels: { color: "#e6edf3" } } }
    }
  });
}

/* --------------------------------------------------
   HISTORY LADEN
-------------------------------------------------- */
firebase.database().ref("weather/history").on("value", snap => {
  const data = snap.val();
  if (!data) return;

  const now = Date.now() / 1000;

  const weekLabels = [];
  const weekTemps = [];

  const monthLabels = [];
  const monthTemps = [];

  const yearLabels = [];
  const yearTemps = [];

  const windLabels = [];
  const windValues = [];

  const rainLabels = [];
  const rainValues = [];

  const windDirValues = [];

  for (const k in data) {
    const e = data[k];
    const age = now - e.ts;
    const date = new Date(e.ts * 1000);

    if (age <= 7 * 86400) {
      weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
      weekTemps.push(e.temp);
    }

    if (age <= 30 * 86400) {
      monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
      monthTemps.push(e.temp);
    }

    if (age <= 365 * 86400) {
      yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
      yearTemps.push(e.temp);
    }

    windLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    windValues.push(e.wind);

    rainLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    rainValues.push(e.rain);

    windDirValues.push(e.winddir);
  }

  drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
  drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
  drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");

  drawChart("windChart", windLabels, windValues, "Wind (km/h)");
  drawChart("rainChart", rainLabels, rainValues, "Regen (mm)");

  drawWindRose(windDirValues);
});

/* --------------------------------------------------
   START
-------------------------------------------------- */
window.onload = function() {
  loadLive();
  loadForecast("5h");
};
</script>

</body>
</html>
