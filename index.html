<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wetterstation Stuben</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header class="top-header">
        <div class="header-left">
            <div class="main-title">Wetterstation Stuben</div>
            <div class="sub-title">Martin Huber</div>
        </div>

        <div class="header-right">
            <!-- IMG entfernt → SVG-Container -->
            <div id="liveIcon"></div>
        </div>
    </header>

    <!-- LIVE-BEREICH -->
    <div class="current-box">
        <div class="current-value">
            <span id="liveTemp">--</span><span class="unit">°C</span>
        </div>

        <div class="current-sub" id="live">
            Lade Daten…
        </div>
    </div>

    <!-- SUNRISE / SUNSET -->
    <h2 class="section-title">Sonnenaufgang & Sonnenuntergang</h2>

    <div class="sun-container">

        <!-- Sunrise -->
        <div class="sunrise-icon">
            <svg class="sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="14" r="4"></circle>
                <line x1="12" y1="2" x2="12" y2="6"></line>
                <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
                <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
                <line x1="2" y1="14" x2="6" y2="14"></line>
                <line x1="18" y1="14" x2="22" y2="14"></line>
                <polyline points="8 17 12 21 16 17"></polyline>
            </svg>
            <div id="sunriseText" class="sunrise-time">--:--</div>
        </div>

        <!-- Sunset -->
        <div class="sunset-icon">
            <svg class="sunset-sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="10" r="4"></circle>
                <line x1="12" y1="2" x2="12" y2="6"></line>
                <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
                <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
                <line x1="2" y1="14" x2="6" y2="14"></line>
                <line x1="18" y1="14" x2="22" y2="14"></line>
                <polyline points="16 17 12 21 8 17"></polyline>
            </svg>
            <div id="sunsetText" class="sunset-time">--:--</div>
        </div>

    </div>

    <!-- CHARTS -->
    <h2 class="section-title">Wochentemperatur</h2>
    <canvas id="weekChart" height="120"></canvas>

    <h2 class="section-title">Monatstemperatur</h2>
    <canvas id="monthChart" height="120"></canvas>

    <h2 class="section-title">Jahrestemperatur</h2>
    <canvas id="yearChart" height="120"></canvas>

    <h2 class="section-title">Wind</h2>
    <canvas id="windChart" height="120"></canvas>

    <h2 class="section-title">Regen</h2>
    <canvas id="rainChart" height="120"></canvas>

    <h2 class="section-title">Windrose</h2>
    <canvas id="windRose" height="200"></canvas>

</div> <!-- container -->

<!-- JAVASCRIPT -->
<script>
/* --------------------------------------------------
   FIREBASE INIT
-------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.appspot.com",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

/* --------------------------------------------------
   SVG ICONS
-------------------------------------------------- */
const icons = {
    sun: `
        <svg viewBox="0 0 24 24" width="60" height="60" stroke="#FFD700" fill="none" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="4"></line>
          <line x1="12" y1="20" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"></line>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="4" y2="12"></line>
          <line x1="20" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"></line>
          <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"></line>
        </svg>
    `,
    suncloud: `
        <svg viewBox="0 0 24 24" width="60" height="60" stroke="#FFD700" fill="none" stroke-width="2" stroke-linecap="round">
          <circle cx="8" cy="8" r="4"></circle>
          <line x1="8" y1="1" x2="8" y2="3"></line>
          <line x1="1" y1="8" x2="3" y2="8"></line>
          <line x1="8" y1="13" x2="8" y2="15"></line>
          <line x1="13" y1="8" x2="15" y2="8"></line>
          <path d="M14 14c-1.5 0-2.7 1-3 2.3A3 3 0 0 0 14 20h6a3 3 0 0 0 0-6h-1"></path>
        </svg>
    `,
    cloud: `
        <svg viewBox="0 0 24 24" width="60" height="60" stroke="#CCCCCC" fill="none" stroke-width="2" stroke-linecap="round">
          <path d="M5 18h12a4 4 0 0 0 0-8 6 6 0 0 0-11.5-2A4 4 0 0 0 5 18z"></path>
        </svg>
    `
};

/* --------------------------------------------------
   Wolken-Logik
-------------------------------------------------- */
function cloudIconByPercent(clouds) {
    if (clouds < 10) return "sun";
    if (clouds < 50) return "suncloud";
    return "cloud";
}

/* --------------------------------------------------
   LIVE-DATEN
-------------------------------------------------- */
function loadLive() {
  firebase.database().ref("weather/live").on("value", snap => {
    const e = snap.val();
    if (!e) return;

    document.getElementById("liveTemp").textContent = e.temp.toFixed(1);

    const time = new Date(e.timestamp * 1000).toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    document.getElementById("live").innerHTML = `
      Feuchte: ${e.humidity}%<br>
      Druck: ${e.pressure} hPa<br>
      Wind: ${e.wind} km/h aus ${e.winddir}°<br>
      Regen (1h): ${e.rain} mm<br>
      Wolken: ${e.clouds}%<br>
      Stand: ${time}
    `;

    // NEUES ICON
    const iconName = cloudIconByPercent(e.clouds);
    document.getElementById("liveIcon").innerHTML = icons[iconName];
  });
}

/* --------------------------------------------------
   SUN
-------------------------------------------------- */
function startSun() {
  firebase.database().ref("weather/sun").on("value", snap => {
    const s = snap.val();
    if (!s) return;

    document.getElementById("sunriseText").textContent =
      new Date(s.sunrise * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

    document.getElementById("sunsetText").textContent =
      new Date(s.sunset * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  });
}

/* --------------------------------------------------
   CHART-FUNKTIONEN
-------------------------------------------------- */
function linearRegression(values) {
  const n = values.length;
  if (n < 2) return values;

  const x = [...Array(n).keys()];
  const y = values;

  const sumX = x.reduce((a,b)=>a+b,0);
  const sumY = y.reduce((a,b)=>a+b,0);
  const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
  const sumXX = x.reduce((a,b)=>a + b*b, 0);

  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;

  return x.map(i => slope * i + intercept);
}

function minLine(values) {
  const min = Math.min(...values);
  return values.map(() => min);
}

function drawChart(id, labels, data, title) {
  new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: title,
          data,
          borderColor: "#58a6ff",
          backgroundColor: "rgba(88,166,255,0.15)",
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: "Trend",
          data: linearRegression(data),
          borderColor: "#00ff99",
          borderWidth: 2,
          borderDash: [6, 6],
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: "Minimum",
          data: minLine(data),
          borderColor: "#ff4444",
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#e6edf3" } } },
      scales: {
        x: { ticks: { color: "#e6edf3" } },
        y: { ticks: { color: "#e6edf3" } }
      }
    }
  });
}

/* --------------------------------------------------
   HISTORY
-------------------------------------------------- */
function startHistory() {
  firebase.database().ref("weather/history").on("value", snap => {
    const data = snap.val();
    if (!data) return;

    const now = Date.now() / 1000;

    const weekLabels = [], weekTemps = [];
    const monthLabels = [], monthTemps = [];
    const yearLabels = [], yearTemps = [];
    const windLabels = [], windValues = [];
    const rainLabels = [], rainValues = [];
    const windDirValues = [];

    for (const k in data) {
      const e = data[k];
      const age = now - e.ts;
      const date = new Date(e.ts * 1000);

      if (age <= 7 * 86400) {
        weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
        weekTemps.push(e.temp);
      }

      if (age <= 30 * 86400) {
        monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
        monthTemps.push(e.temp);
      }

      if (age <= 365 * 86400) {
        yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
        yearTemps.push(e.temp);
      }

      windLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
      windValues.push(e.wind);

      rainLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
      rainValues.push(e.rain);

      windDirValues.push(e.winddir);
    }

    drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
    drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
    drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");

    drawChart("windChart", windLabels, windValues, "Wind (km/h)");
    drawChart("rainChart", rainLabels, rainValues, "Regen (mm)");

    drawWindRose(windDirValues);
  });
}

/* --------------------------------------------------
   WINDROSE
-------------------------------------------------- */
function drawWindRose(windDirections) {
  const counts = new Array(8).fill(0);

  windDirections.forEach(dir => {
    const index = Math.floor((dir % 360) / 45);
    counts[index]++;
  });

  new Chart(document.getElementById("windRose"), {
    type: "polarArea",
    data: {
      labels: ["N","NO","O","SO","S","SW","W","NW"],
      datasets: [{
        data: counts,
        backgroundColor: [
          "#4ea3ff","#6ec6ff","#ffd966","#ff8c42",
          "#ff4d4d","#d9534f","#5bc0de","#5cb85c"
        ]
      }]
    },
    options: {
      scales: { r: { ticks: { color: "#e6edf3" } } },
      plugins: { legend: { labels: { color: "#e6edf3" } } }
    }
  });
}

/* --------------------------------------------------
   START
-------------------------------------------------- */
window.onload = function() {
  loadLive();
  startSun();
  startHistory();
};
</script>

</body>
</html>
