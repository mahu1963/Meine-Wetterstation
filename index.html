<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Wetterstation</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- WICHTIG: Ohne diesen Tag KEIN ICON -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <script type="module" src="app.js"></script>
</head>

<body>
  <div class="container">
    <h1>Meine Wetterstation</h1>

    <!-- Live Box -->
    <div class="current-box">
      <div class="current-value">
        <span id="live-temp">--.-</span>
        <span class="unit">°C</span>
      </div>

      <div class="current-sub">
        <span>Feuchte: <span id="live-hum">--</span>%</span>
        <span>Druck: <span id="live-pres">----</span> hPa</span>
        <span id="timestamp">Stand: --</span>
      </div>

      <div id="live-icon" class="icon-box"></div>
    </div>

    <!-- Statistik-Karten -->
    <div class="stats-grid">

      <div class="stats-card">
        <h3>Heute</h3>
        <p>Min: <span id="minToday">-</span></p>
        <p>Max: <span id="maxToday">-</span></p>
      </div>

      <div class="stats-card">
        <h3>Monat</h3>
        <p>Min: <span id="minMonth">-</span></p>
        <p>Max: <span id="maxMonth">-</span></p>
        <p>Ø: <span id="avgMonth">-</span></p>
      </div>

      <div class="stats-card">
        <h3>Jahr</h3>
        <p>Min: <span id="minYear">-</span></p>
        <p>Max: <span id="maxYear">-</span></p>
        <p>Ø: <span id="avgYear">-</span></p>
      </div>

    </div>

  </div>
</body>
</html>
