<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Wetterstation</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  background: #0f0f0f;
  color: #e6edf3;
  font-family: Arial, sans-serif;
  margin: 20px;
}

/* TIMELINE FORECAST */
.timeline {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px 0;
  scrollbar-width: thin;
}

.timeline::-webkit-scrollbar {
  height: 6px;
}

.timeline::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 3px;
}

.timeline-box {
  min-width: 85px;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 6px rgba(0,0,0,0.3);
  flex-shrink: 0;
}

.timeline-box img {
  width: 42px;
  height: 42px;
}

.timeline-temp {
  font-size: 1.2rem;
  font-weight: bold;
  margin-bottom: 4px;
}

.timeline-hour {
  font-size: 0.9rem;
  opacity: 0.8;
}
</style>
</head>

<body>

<h1>Meine Wetterstation</h1>

<!-- LIVE -->
<h2>Live Wetter</h2>
<div id="live"></div>

<!-- SUN -->
<h2>Sonne</h2>
<div id="sun"></div>

<!-- FORECAST -->
<h2>Vorhersage (5 Stunden)</h2>
<div id="forecastTimeline" class="timeline"></div>

<canvas id="forecastChart" height="120"></canvas>

<!-- HISTORY -->
<h2>Wochentemperatur</h2>
<canvas id="weekChart" height="120"></canvas>

<h2>Monatstemperatur</h2>
<canvas id="monthChart" height="120"></canvas>

<h2>Jahrestemperatur</h2>
<canvas id="yearChart" height="120"></canvas>

<h2>Wind</h2>
<canvas id="windChart" height="120"></canvas>

<h2>Regen</h2>
<canvas id="rainChart" height="120"></canvas>

<h2>Windrose</h2>
<canvas id="windRose" height="200"></canvas>

<script>
// --------------------------------------------------
// FIREBASE INIT
// --------------------------------------------------
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_DOMAIN",
  databaseURL: "DEINE_URL",
  projectId: "DEIN_PROJECT",
  storageBucket: "DEIN_BUCKET",
  messagingSenderId: "DEINE_ID",
  appId: "DEINE_APPID"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().signInAnonymously()
  .then(() => console.log("Web anonym eingeloggt"))
  .catch(err => console.error(err));


// --------------------------------------------------
// LIVE
// --------------------------------------------------
function loadLive() {
  firebase.database().ref("weather/live").on("value", snap => {
    const e = snap.val();
    if (!e) return;

    document.getElementById("live").innerHTML = `
      <b>${e.temp.toFixed(1)}°C</b><br>
      Feuchte: ${e.hum}%<br>
      Druck: ${e.press} hPa<br>
      Wind: ${e.wind} km/h aus ${e.winddir}°<br>
      Regen (1h): ${e.rain} mm<br>
      Wolken: ${e.clouds}%<br>
      Stand: ${new Date(e.ts * 1000).toLocaleTimeString("de-DE")}
    `;
  });
}


// --------------------------------------------------
// SUN
// --------------------------------------------------
firebase.database().ref("weather/sun").on("value", snap => {
  const s = snap.val();
  if (!s) return;

  document.getElementById("sun").innerHTML = `
    Sonnenaufgang: ${s.sunrise}<br>
    Sonnenuntergang: ${s.sunset}
  `;
});


// --------------------------------------------------
// TIMELINE FORECAST
// --------------------------------------------------
function renderTimeline(arr) {
  const box = document.getElementById("forecastTimeline");
  box.innerHTML = "";

  arr.forEach(item => {
    const icon = item.icon || "01d";
    const t = new Date(item.ts * 1000);
    const hour = t.toLocaleTimeString("de-DE", { hour: "2-digit" });

    box.innerHTML += `
      <div class="timeline-box">
        <div class="timeline-temp">${item.temp.toFixed(1)}°C</div>
        <img src="https://openweathermap.org/img/wn/${icon}@2x.png">
        <div class="timeline-hour">${hour}</div>
      </div>
    `;
  });
}


// --------------------------------------------------
// FORECAST DIAGRAMM
// --------------------------------------------------
let forecastChart = null;

function drawForecastChart(data) {
  const labels = data.map(e => {
    const t = new Date(e.ts * 1000);
    return t.toLocaleTimeString("de-DE", { hour: "2-digit" });
  });

  const temps = data.map(e => e.temp);

  const icons = data.map(e => {
    const iconCode = e.icon || "01d";
    const img = new Image();
    img.src = `https://openweathermap.org/img/wn/${iconCode}.png`;
    img.onload = () => forecastChart?.update();
    return img;
  });

  const ctx = document.getElementById("forecastChart");

  if (forecastChart) forecastChart.destroy();

  forecastChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Temperatur",
        data: temps,
        borderColor: "#4ea3ff",
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 14,
        pointStyle: icons
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}


// --------------------------------------------------
// FORECAST LADEN
// --------------------------------------------------
function loadForecast(type) {
  firebase.database().ref("weather/forecast/" + type).on("value", snap => {
    const arr = snap.val();
    if (!arr) return;

    renderTimeline(arr);
    drawForecastChart(arr);
  });
}


// --------------------------------------------------
// HISTORY (unverändert aus deinem Code)
// --------------------------------------------------
function linearRegression(yValues) {
  const n = yValues.length;
  if (n < 2) return null;

  const x = [...Array(n).keys()];
  const y = yValues;

  const sumX = x.reduce((a,b)=>a+b,0);
  const sumY = y.reduce((a,b)=>a+b,0);
  const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
  const sumXX = x.reduce((a,b)=>a + b*b, 0);

  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;

  return x.map(i => slope * i + intercept);
}

function minLine(values) {
  const min = Math.min(...values);
  return values.map(() => min);
}

function drawChart(id, labels, data, title) {
  const ctx = document.getElementById(id);

  const trend = linearRegression(data) || data;
  const minL = minLine(data);

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: title,
          data,
          borderColor: "#ffffff",
          backgroundColor: "rgba(255,255,255,0.1)",
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: "Trend",
          data: trend,
          borderColor: "#00ff88",
          borderWidth: 2,
          borderDash: [6, 6],
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: "Minimum",
          data: minL,
          borderColor: "#ff4444",
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}


// --------------------------------------------------
// HISTORY LADEN
// --------------------------------------------------
firebase.database().ref("weather/history").on("value", snap => {
  const data = snap.val();
  if (!data) return;

  const now = Date.now() / 1000;

  const weekLabels = [];
  const weekTemps = [];

  const monthLabels = [];
  const monthTemps = [];

  const yearLabels = [];
  const yearTemps = [];

  const windLabels = [];
  const windValues = [];

  const rainLabels = [];
  const rainValues = [];

  const windDirValues = [];

  for (const k in data) {
    const e = data[k];
    const age = now - e.ts;
    const date = new Date(e.ts * 1000);

    if (age <= 7 * 86400) {
      weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
      weekTemps.push(e.temp);
    }

    if (age <= 30 * 86400) {
      monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
      monthTemps.push(e.temp);
    }

    if (age <= 365 * 86400) {
      yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
      yearTemps.push(e.temp);
    }

    windLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    windValues.push(e.wind);

    rainLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    rainValues.push(e.rain);

    windDirValues.push(e.winddir);
  }

  drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
  drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
  drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");

  drawChart("windChart", windLabels, windValues, "Wind (km/h)");
  drawChart("rainChart", rainLabels, rainValues, "Regen (mm)");

  drawWindRose(windDirValues);
});


// --------------------------------------------------
// WINDROSE
// --------------------------------------------------
function drawWindRose(windDirections) {
  const counts = new Array(8).fill(0);

  windDirections.forEach(dir => {
    const index = Math.floor((dir % 360) / 45);
    counts[index]++;
  });

  new Chart(document.getElementById("windRose"), {
    type: "polarArea",
    data: {
      labels: ["N","NO","O","SO","S","SW","W","NW"],
      datasets: [{
        data: counts,
        backgroundColor: [
          "#4ea3ff","#6ec6ff","#ffd966","#ff8c42",
          "#ff4d4d","#d9534f","#5bc0de","#5cb85c"
        ]
      }]
    },
    options: {
      scales: { r: { ticks: { color: "#e6edf3" } } },
      plugins: { legend: { labels: { color: "#e6edf3" } } }
    }
  });
}


// --------------------------------------------------
// START
// --------------------------------------------------
window.onload = function() {
  loadLive();
  loadForecast("5h");
};
</script>

</body>
</html>
