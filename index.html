<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Wetterstation Bernstein</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #f5f5f5;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .current-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1f2a3d, #283854);
      margin-bottom: 20px;
    }

    .current-value {
      font-size: 3rem;
      font-weight: 600;
    }

    .current-value .unit {
      font-size: 1.4rem;
      margin-left: 4px;
      opacity: .8;
    }

    .current-sub {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: .95rem;
      opacity: .9;
    }

    .sun-container {
      display: flex;
      gap: 24px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .sunrise-icon,
    .sunset-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .forecast-row {
      display: flex;
      gap: 16px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .forecast-item {
      text-align: center;
      font-size: .9rem;
    }

    .forecast-item img {
      width: 40px;
      height: 40px;
      display: block;
      margin: 0 auto 4px;
    }

    .stats-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .stats-card {
      flex: 1 1 220px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #151b2b;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .35);
      font-size: .95rem;
    }

    canvas {
      background: #111624;
      border-radius: 12px;
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Animiertes Top-Icon */
    #icon-top {
      width: 80px;
      height: 80px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .current-box {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <div style="text-align:center; margin-bottom:20px;">
    <h1 style="margin:0; font-size:2.6rem;">Wetterstation-Stuben</h1>
    <div style="font-size:2.3rem; margin-top:10px; opacity:0.9;">
      Martin Huber
    </div>
  </div>

  <!-- LIVE (ESP32) -->
  <div class="current-box">
    <div>
      <div class="current-value">
        <span id="live-temp">--.-</span><span class="unit">°C</span>
      </div>
      <div class="current-sub">
        <span>Luftfeuchte: <b id="live-hum">--</b>%</span>
        <span>Luftdruck: <b id="live-pres">----</b> hPa</span>
        <span id="timestamp">Stand: --</span>
      </div>
    </div>
    <img id="icon-top" src="icons/weather/01d.svg" alt="Wetter-Icon">
  </div>

  <!-- SUNRISE + SUNSET -->
  <div class="sun-container">
    <div class="sunrise-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v6" />
        <path d="M5.2 9.2l2.8 2.8" />
        <path d="M18.8 9.2l-2.8 2.8" />
        <path d="M4 16h16" />
        <path d="M7 20h10" />
      </svg>
      <div id="sunrise">--:--</div>
    </div>

    <div class="sunset-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22v-6" />
        <path d="M5.2 14.8l2.8-2.8" />
        <path d="M18.8 14.8l-2.8-2.8" />
        <path d="M4 16h16" />
        <path d="M7 20h10" />
      </svg>
      <div id="sunset">--:--</div>
    </div>
  </div>

  <!-- FORECAST 5h -->
  <h2>Vorhersage (nächste 5 Stunden)</h2>
  <div class="forecast-row">
    <div class="forecast-item">
      <img id="f0" alt="Vorhersage 0">
      <div id="ft0">--°C</div>
    </div>
    <div class="forecast-item">
      <img id="f1" alt="Vorhersage 1">
      <div id="ft1">--°C</div>
    </div>
    <div class="forecast-item">
      <img id="f2" alt="Vorhersage 2">
      <div id="ft2">--°C</div>
    </div>
    <div class="forecast-item">
      <img id="f3" alt="Vorhersage 3">
      <div id="ft3">--°C</div>
    </div>
    <div class="forecast-item">
      <img id="f4" alt="Vorhersage 4">
      <div id="ft4">--°C</div>
    </div>
  </div>

  <!-- CHARTS -->
  <h2>Verlauf (Woche)</h2>
  <canvas id="chartWeek" height="120"></canvas>

  <h2>Verlauf (Jahr)</h2>
  <canvas id="chartYear" height="120"></canvas>

  <!-- MONAT / JAHR STATS -->
  <div class="stats-grid">
    <div class="stats-card">
      <h3>Monat</h3>
      <p>Min: <b id="minMonth">-</b></p>
      <p>Max: <b id="maxMonth">-</b></p>
      <p>Ø: <b id="avgMonth">-</b></p>
    </div>
    <div class="stats-card">
      <h3>Jahr</h3>
      <p>Min: <b id="minYear">-</b></p>
      <p>Max: <b id="maxYear">-</b></p>
      <p>Ø: <b id="avgYear">-</b></p>
    </div>
  </div>

</div>

<!-- Wenn du keine lokale chart.js hast, lieber CDN nutzen: -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
