<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation – Stuben Martin Huber</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    padding: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #6ec6ff 0%, #2a66c7 40%, #0a1a33 100%);
    padding: 35px 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    color: white;
    text-align: center;
}

.header-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

.header-temp {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
}

.header-details {
    font-size: 18px;
    margin-bottom: 5px;
}

.header-time {
    font-size: 16px;
    margin-bottom: 10px;
}

/* STATISTIK BOX */
.box {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* FORECAST */
.forecast-container {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.forecast-box {
    background: #161b22;
    padding: 10px;
    border-radius: 10px;
    width: 80px;
    text-align: center;
}

/* CHARTS */
canvas {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">Wetterstation – Stuben Martin Huber</div>
    <div class="header-temp" id="temp">--.- °C</div>
    <div class="header-details" id="details">Feuchte: -- %   Druck: ---- hPa</div>
    <div class="header-time" id="time">Stand: --:--</div>
</div>

<!-- STATISTIK -->
<div class="box">
    <h2>Verlauf / Statistik</h2>
    <div>Woche (Ø Temp): <span id="avg-week">--.- °C</span></div>
    <div>Monat (Ø Temp): <span id="avg-month">--.- °C</span></div>
    <div>Jahr (Ø Temp): <span id="avg-year">--.- °C</span></div>

    <br>

    <div>Sonnenaufgang: <span id="sunrise">--:--</span></div>
    <div>Sonnenuntergang: <span id="sunset">--:--</span></div>
</div>

<!-- FORECAST -->
<h2>Vorhersage (5 Stunden)</h2>
<div class="forecast-container" id="forecast"></div>

<!-- CHARTS -->
<h2>Wochenverlauf</h2>
<canvas id="weekChart"></canvas>

<h2>Monatsverlauf</h2>
<canvas id="monthChart"></canvas>

<h2>Jahresverlauf</h2>
<canvas id="yearChart"></canvas>

<!-- Frontend-Logik -->
<script type="module" src="app.js"></script>

</body>
</html>
