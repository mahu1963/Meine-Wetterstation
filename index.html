<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wetterstation">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #0d0d0d;
  --fg: #f5f5f5;
  --card: #1a1a1a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: var(--bg);
  color: var(--fg);
  padding: 20px;
}

#container {
  max-width: 480px;
  margin: 0 auto;
}

/* Topbar */
#topbar {
  width: 100%;
  background: #111;
  padding: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

#top-left {
  font-size: 16px;
  line-height: 1.2;
}

#top-right {
  text-align: right;
}

/* Live Werte */
.live-row {
  background: var(--card);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  font-size: 20px;
  display: flex;
  justify-content: space-between;
}

/* Charts */
canvas {
  max-width: 100%;
  width: 100%;
  min-height: 260px !important;
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
}

button {
  padding: 8px 14px;
  margin-right: 6px;
  cursor: pointer;
  background: #222;
  color: var(--fg);
  border: 1px solid #444;
  border-radius: 6px;
}

.hidden { display: none; }

/* Forecast */
#forecast-box {
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>
<div id="container">

<h1 style="text-align:center;">🌤 Wetterstation</h1>
<div style="text-align:center; font-size:20px; opacity: 1.0; margin-top:-8px;">
  von Martin Huber
</div>

<div id="topbar">
  <div id="top-left">
    <div id="sunrise">🌅 --:--</div>
    <div id="sunset">🌇 --:--</div>
  </div>

  <div id="top-right">
    <div id="top-weather-icon" style="font-size:40px;">☀️</div>
    <div id="top-ow-temp" style="font-size:22px; font-weight:bold; color:#00eaff;">-- °C</div>
    <div id="top-live-temp" style="font-size:18px; font-weight:bold; color:#ccc;">Live: -- °C ➝</div>
  </div>
</div>

<h2>Aktuelle Messwerte</h2>

<div class="live-row">
  <span>🌡 Temperatur</span>
  <span id="live-temp">-- °C</span>
</div>

<div class="live-row">
  <span>💧 Luftfeuchtigkeit</span>
  <span id="live-hum">-- %</span>
</div>

<div class="live-row">
  <span>🌍 Luftdruck</span>
  <span id="live-press">-- hPa</span>
</div>

<div class="live-row">
  <span>⏱ Aktualisiert</span>
  <span id="live-time">--:--</span>
</div>

<div class="live-row">
  <span>Trend</span>
  <span id="live-trend">--</span>
</div>

<div class="tab">
  <button onclick="showTab('24h')">24h</button>
  <button onclick="showTab('week')">Woche</button>
  <button onclick="showTab('month')">Monat</button>
  <button onclick="showTab('year')">Jahr</button>
</div>

<div id="24h"><canvas id="chart24h"></canvas></div>
<div id="week" class="hidden"><canvas id="chartWeek"></canvas></div>
<div id="month" class="hidden"><canvas id="chartMonth"></canvas></div>
<div id="year" class="hidden"><canvas id="chartYear"></canvas></div>

<div id="forecast-box">
  <h2>OpenWeather Vorhersage (5 Tage)</h2>
  <div id="forecast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.appspot.com",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:a05ed68495b1b16d6059c3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Sommerzeit */
function isDST(date = new Date()) {
  const year = date.getFullYear();
  const march = new Date(year, 2, 31);
  const lastSundayMarch = new Date(year, 2, 31 - march.getDay());
  const october = new Date(year, 9, 31);
  const lastSundayOctober = new Date(year, 9, 31 - october.getDay());
  const dstStart = new Date(year, 2, lastSundayMarch.getDate(), 2, 0, 0);
  const dstEnd   = new Date(year, 9, lastSundayOctober.getDate(), 3, 0, 0);
  return date >= dstStart && date < dstEnd;
}

function getLocalOffsetSeconds() {
  return isDST() ? 7200 : 3600;
}

function formatLocalSunTime(utcSeconds) {
  const offset = getLocalOffsetSeconds();
  return new Date((utcSeconds + offset) * 1000)
    .toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

/* Live-Werte */
const liveRef = ref(db, "weather/live");
let lastTemp = null;

onValue(liveRef, (snap) => {
  const d = snap.val();
  if (!d) return;

  const t = d.temperature;

  document.getElementById("live-temp").textContent = t.toFixed(1) + " °C";
  document.getElementById("live-hum").textContent = d.humidity.toFixed(1) + " %";
  document.getElementById("live-press").textContent = d.pressure.toFixed(1) + " hPa";

  if (d.timestamp) {
    const lt = new Date(d.timestamp * 1000)
      .toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("live-time").textContent = lt;
  }

  /* Trend */
  let trendText = "";
  let trendColor = "";
  let trendArrow = "";

  if (lastTemp !== null) {
    if (t > lastTemp) {
      trendText = "steigt";
      trendColor = "#00ff6a";
      trendArrow = "▲";
    } else if (t < lastTemp) {
      trendText = "fällt";
      trendColor = "#ff4444";
      trendArrow = "▼";
    } else {
      trendText = "stabil";
      trendColor = "#cccccc";
      trendArrow = "➝";
    }
  }

  document.getElementById("live-trend").textContent = trendText;
  document.getElementById("live-trend").style.color = trendColor;

  document.getElementById("top-live-temp").style.color = trendColor;
  document.getElementById("top-live-temp").textContent =
    `Live: ${t.toFixed(1)} °C ${trendArrow}`;

  lastTemp = t;

  /* Wetter-Icon */
  let icon = "❓";

  if (d.openweather && d.openweather.weather && d.openweather.weather[0]) {
    const w = d.openweather.weather[0].main.toLowerCase();

    if (w.includes("clear")) icon = "☀️";
    else if (w.includes("cloud")) icon = "☁️";
    else if (w.includes("rain")) icon = "🌧️";
    else if (w.includes("snow")) icon = "❄️";
    else icon = "🌡️";
  }

  document.getElementById("top-weather-icon").textContent = icon;

  /* OpenWeather Temperatur */
  if (d.openweather && d.openweather.main && d.openweather.main.temp) {
    document.getElementById("top-ow-temp").textContent =
      d.openweather.main.temp.toFixed(1) + " °C";
  }

  /* Sonnenzeiten */
  if (d.openweather && d.openweather.sys) {
    if (d.openweather.sys.sunrise)
      document.getElementById("sunrise").textContent =
        "🌅 " + formatLocalSunTime(d.openweather.sys.sunrise);

    if (d.openweather.sys.sunset)
      document.getElementById("sunset").textContent =
        "🌇 " + formatLocalSunTime(d.openweather.sys.sunset);
  }
});

/* Tabs */
function showTab(id) {
  document.getElementById("24h").classList.add("hidden");
  document.getElementById("week").classList.add("hidden");
  document.getElementById("month").classList.add("hidden");
  document.getElementById("year").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* History laden */
async function loadHistory(path) {
  const snap = await get(ref(db, path));
  return snap.val();
}

/* Charts zeichnen */
async function drawCharts() {
  const h24 = await loadHistory("weather/history/24h");
  const week = await loadHistory("weather/history/week");
  const month = await loadHistory("weather/history/month");
  const year = await loadHistory("weather/history/year");

  drawChart24h(h24);
  drawChartWeek(week);
  drawChartMonth(month);
  drawChartYear(year);
}

function drawChart24h(data) {
  if (!data) return;

  const labels = [];
  const t = [];
  const h = [];
  const p = [];

  Object.keys(data).sort().forEach(ts => {
    const d = data[ts];
    const date = new Date(Number(ts) * 1000);
    labels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    t.push(d.t);
    h.push(d.h);
    p.push(d.p);
  });

  new Chart(document.getElementById("chart24h"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temperatur (°C)", data: t, borderColor: "red" },
        { label: "Feuchte (%)", data: h, borderColor: "cyan" },
        { label: "Druck (hPa)", data: p, borderColor: "yellow" }
      ]
    }
  });
}

function drawChartWeek(data) {
  if (!data) return;

  const labels = [];
  const t = [];
  const h = [];
  const p = [];

  Object.keys(data).sort().forEach(day => {
    const d = data[day];
    labels.push(day);
    t.push((d.t_min + d.t_max) / 2);
    h.push((d.h_min + d.h_max) / 2);
    p.push((d.p_min + d.p_max) / 2);
  });

  new Chart(document.getElementById("chartWeek"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temperatur (°C)", data: t, borderColor: "red" },
        { label: "Feuchte (%)", data: h, borderColor: "cyan" },
        { label: "Druck (hPa)", data: p, borderColor: "yellow" }
      ]
    }
  });
}

function drawChartMonth(data) {
  if (!data) return;

  const labels = [];
  const t = [];
  const h = [];
  const p = [];

  Object.keys(data).sort().forEach(day => {
    const d = data[day];
    labels.push(day);
    t.push((d.t_min + d.t_max) / 2);
    h.push((d.h_min + d.h_max) / 2);
    p.push((d.p_min + d.p_max) / 2);
  });

  new Chart(document.getElementById("chartMonth"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temperatur (°C)", data: t, borderColor: "red" },
        { label: "Feuchte (%)", data: h, borderColor: "cyan" },
        { label: "Druck (hPa)", data: p, borderColor: "yellow" }
      ]
    }
  });
}

function drawChartYear(data) {
  if (!data) return;

  const labels = [];
  const t = [];
  const h = [];
  const p = [];

  Object.keys(data).sort().forEach(day => {
    const d = data[day];
    labels.push(day);
    t.push((d.t_min + d.t_max) / 2);
    h.push((d.h_min + d.h_max) / 2);
    p.push((d.p_min + d.p_max) / 2);
  });

  new Chart(document.getElementById("chartYear"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temperatur (°C)", data: t, borderColor: "red" },
        { label: "Feuchte (%)", data: h, borderColor: "cyan" },
        { label: "Druck (hPa)", data: p, borderColor: "yellow" }
      ]
    }
  });
}

drawCharts();
</script>

</div>
</body>
</html>
