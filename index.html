<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetterstation Stuben‑Bernstein</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom, #4a90e2, #1c3d73);
            color: white;
            text-align: center;
        }

        header {
            padding: 30px 20px 10px;
        }

        h1 {
            font-size: 2.4rem;
            margin: 0;
            font-weight: 700;
        }

        .subline {
            font-size: 1.3rem;
            margin-top: 5px;
            opacity: 0.9;
            font-weight: 300;
        }

        .timestamp {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.85;
        }

        .icons {
            margin-top: 25px;
            font-size: 3rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Wetterstation Stuben‑Bernstein</h1>
        <div class="subline">Martin Huber</div>
        <div class="timestamp" id="timestamp">Stand: --.--.----, --:--:--</div>
        <div class="icons">🌙 / 🌞</div>
    </header>

    <script>
        function updateTime() {
            const now = new Date();
            const options = {
                day: "numeric",
                month: "numeric",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            };
            document.getElementById("timestamp").textContent =
                "Stand: " + now.toLocaleString("de-DE", options);
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
