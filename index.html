<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Wetterstation</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase v9 -->
  <script type="module" src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1>Meine Wetterstation</h1>

    <div class="current-box">
      <div class="current-value">
        <span id="temp">--.-</span>
        <span class="unit">°C</span>
      </div>
      <div class="current-sub">
        <span>Feuchte: <span id="hum">--</span>%</span>
        <span>Druck: <span id="pres">----</span> hPa</span>
      </div>
    </div>

    <div class="minmax-row">
      <div class="minmax-card">
        <h2>Heute</h2>
        <p>Min: <span id="minToday">-</span></p>
        <p>Max: <span id="maxToday">-</span></p>
      </div>
      <div class="minmax-card">
        <h2>Monat</h2>
        <p>Min: <span id="minMonth">-</span></p>
        <p>Max: <span id="maxMonth">-</span></p>
        <p>Ø: <span id="avgMonth">-</span></p>
      </div>
      <div class="minmax-card">
        <h2>Jahr</h2>
        <p>Min: <span id="minYear">-</span></p>
        <p>Max: <span id="maxYear">-</span></p>
        <p>Ø: <span id="avgYear">-</span></p>
      </div>
    </div>

    <h2>Verlauf heute</h2>
    <canvas id="dayChart"></canvas>

    <h2>Monats-Min/Max</h2>
    <canvas id="monthChart"></canvas>
  </div>
</body>
</html>
