<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meine Wetterstation</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Theme Color für Android -->
  <meta name="theme-color" content="#4a90e2">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🌦️ Meine Wetterstation</h1>
    <p id="timestamp"></p>
  </header>

  <!-- LIVE -->
  <section id="live" class="card">
    <h2>Aktuelles Wetter</h2>
    <div class="live-grid">
      <div class="value"><span id="live-temp"></span>°C</div>
      <div class="value"><span id="live-hum"></span>%</div>
      <div class="value"><span id="live-pres"></span> hPa</div>
    </div>
  </section>

  <!-- STUNDEN -->
  <section id="forecast-hours" class="card">
    <h2>Vorhersage (nächste Stunden)</h2>
    <div id="hours-container" class="scroll-row"></div>
  </section>

  <!-- TAGE -->
  <section id="forecast-days" class="card">
    <h2>5‑Tage‑Vorhersage</h2>
    <div id="days-container" class="grid-days"></div>
  </section>

  <!-- App Script -->
  <script type="module" src="app.js"></script>

  <!-- Service Worker Registrierung -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registriert"))
        .catch(err => console.log("SW Fehler:", err));
    }
  </script>

</body>
</html>
