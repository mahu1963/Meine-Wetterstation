<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation – Diagramme</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    padding: 20px;
}
h2 {
    margin-top: 40px;
}
canvas {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 40px;
}
</style>
</head>

<body>

<h1>Wetterstation – Temperaturverläufe</h1>

<h2>Wochenverlauf</h2>
<canvas id="weekChart"></canvas>

<h2>Monatsverlauf</h2>
<canvas id="monthChart"></canvas>

<h2>Jahresverlauf</h2>
<canvas id="yearChart"></canvas>

<script>
// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.firebasestorage.app",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

// ---------------- UNIVERSAL CHART FUNCTION ----------------
function drawChart(canvasId, labels, data, title) {
    new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: title,
                data: data,
                borderColor: "#4ea3ff",
                backgroundColor: "rgba(78,163,255,0.2)",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });
}

// ---------------- WEEK DATA ----------------
function loadWeekData() {
    const ref = firebase.database().ref("weather/history/week");
    ref.once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleString("de-DE", {
                hour: "2-digit",
                minute: "2-digit"
            }));
            temps.push(data[ts].temp);
        }

        drawChart("weekChart", labels, temps, "Wochentemperatur");
    });
}

// ---------------- MONTH DATA ----------------
function loadMonthData() {
    const ref = firebase.database().ref("weather/history/month");
    ref.once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleDateString("de-DE"));
            temps.push(data[ts].temp);
        }

        drawChart("monthChart", labels, temps, "Monatstemperatur");
    });
}

// ---------------- YEAR DATA ----------------
function loadYearData() {
    const ref = firebase.database().ref("weather/history/year");
    ref.once("value", snap => {
        const data = snap.val();
        const labels = [];
        const temps = [];

        for (const ts in data) {
            labels.push(new Date(ts * 1000).toLocaleDateString("de-DE", {
                month: "short"
            }));
            temps.push(data[ts].temp);
        }

        drawChart("yearChart", labels, temps, "Jahrestemperatur");
    });
}

// ---------------- START ----------------
window.onload = function() {
    loadWeekData();
    loadMonthData();
    loadYearData();
};
</script>

</body>
</html>
