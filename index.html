<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Wetterstation</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body {
  background: #0f0f0f;
  color: #e6edf3;
  font-family: Arial, sans-serif;
  margin: 20px;
}

/* --------------------------------------------------
   GLAS-HEADER
-------------------------------------------------- */
.top-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 25px;
  margin-bottom: 25px;

  background: linear-gradient(90deg,
    rgba(120,180,255,0.35) 0%,
    rgba(40,60,100,0.25) 40%,
    rgba(10,10,20,0.35) 100%
  );

  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);
}

.title-box {
  display: flex;
  flex-direction: column;
}

.main-title {
  font-size: 2rem;
  font-weight: bold;
  color: #e6edf3;
}

.sub-title {
  font-size: 1rem;
  opacity: 0.75;
}

.weather-icon-box img {
  width: 70px;
  height: 70px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
}
</style>
</head>

<body>

<!-- --------------------------------------------------
     HEADER
-------------------------------------------------- -->
<header class="top-header">
  <div class="title-box">
    <div class="main-title">Wetterstation Stuben</div>
    <div class="sub-title">Martin Huber</div>
  </div>

  <div class="weather-icon-box">
    <img src="https://openweathermap.org/img/wn/01d@2x.png" id="liveIcon">
  </div>
</header>

<h2>Live Wetter</h2>
<div id="live"></div>

<h2>Sonne</h2>

<div class="sun-container">

    <!-- SUNRISE -->
    <div class="sunrise-icon">
        <svg class="sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="14" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
            <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
            <line x1="2" y1="14" x2="6" y2="14"></line>
            <line x1="18" y1="14" x2="22" y2="14"></line>
            <polyline points="8 17 12 21 16 17"></polyline>
        </svg>
        <div id="sunriseText" class="sunrise-time"></div>
    </div>

    <!-- SUNSET -->
    <div class="sunset-icon">
        <svg class="sunset-sun" width="60" height="60" viewBox="0 0 24 24" fill="none"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="4.93" y1="7.05" x2="7.76" y2="9.88"></line>
            <line x1="19.07" y1="7.05" x2="16.24" y2="9.88"></line>
            <line x1="2" y1="14" x2="6" y2="14"></line>
            <line x1="18" y1="14" x2="22" y2="14"></line>
            <polyline points="16 17 12 21 8 17"></polyline>
        </svg>
        <div id="sunsetText" class="sunset-time"></div>
    </div>

</div>

<h2>Wochentemperatur</h2>
<canvas id="weekChart" height="120"></canvas>

<h2>Monatstemperatur</h2>
<canvas id="monthChart" height="120"></canvas>

<h2>Jahrestemperatur</h2>
<canvas id="yearChart" height="120"></canvas>

<h2>Wind</h2>
<canvas id="windChart" height="120"></canvas>

<h2>Regen</h2>
<canvas id="rainChart" height="120"></canvas>

<h2>Windrose</h2>
<canvas id="windRose" height="200"></canvas>

<script>
// --------------------------------------------------
// FIREBASE INIT
// --------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.appspot.com",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().signInAnonymously()
  .then(() => console.log("Web anonym eingeloggt"))
  .catch(err => console.error(err));


// --------------------------------------------------
// LIVE
// --------------------------------------------------
function loadLive() {
  firebase.database().ref("weather/live").on("value", snap => {
    const e = snap.val();
    if (!e) return;

    const time = new Date(e.timestamp * 1000).toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    // Live Icon aktualisieren
    document.getElementById("liveIcon").src =
      `https://openweathermap.org/img/wn/${e.icon}@2x.png`;

    document.getElementById("live").innerHTML = `
      <b>${e.temp.toFixed(1)}°C</b><br>
      Feuchte: ${e.humidity}%<br>
      Druck: ${e.pressure} hPa<br>
      Wind: ${e.wind} km/h aus ${e.winddir}°<br>
      Regen (1h): ${e.rain} mm<br>
      Wolken: ${e.clouds}%<br>
      Stand: ${time}
    `;
  });
}


// --------------------------------------------------
// SUN
// --------------------------------------------------
firebase.database().ref("weather/sun").on("value", snap => {
  const s = snap.val();
  if (!s) return;

  const sunrise = new Date(s.sunrise * 1000).toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit"
  });

  const sunset = new Date(s.sunset * 1000).toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("sun").innerHTML = `
    Sonnenaufgang: ${sunrise}<br>
    Sonnenuntergang: ${sunset}
  `;
});


// --------------------------------------------------
// HISTORY (Charts)
// --------------------------------------------------
function linearRegression(yValues) {
  const n = yValues.length;
  if (n < 2) return null;

  const x = [...Array(n).keys()];
  const y = yValues;

  const sumX = x.reduce((a,b)=>a+b,0);
  const sumY = y.reduce((a,b)=>a+b,0);
  const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
  const sumXX = x.reduce((a,b)=>a + b*b, 0);

  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;

  return x.map(i => slope * i + intercept);
}

function minLine(values) {
  const min = Math.min(...values);
  return values.map(() => min);
}

function drawChart(id, labels, data, title) {
  const ctx = document.getElementById(id);

  const trend = linearRegression(data) || data;
  const minL = minLine(data);

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: title,
          data,
          borderColor: "#ffffff",
          backgroundColor: "rgba(255,255,255,0.1)",
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: "Trend",
          data: trend,
          borderColor: "#00ff88",
          borderWidth: 2,
          borderDash: [6, 6],
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: "Minimum",
          data: minL,
          borderColor: "#ff4444",
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#ccc" } } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" } }
      }
    }
  });
}


// --------------------------------------------------
// HISTORY LADEN
// --------------------------------------------------
firebase.database().ref("weather/history").on("value", snap => {
  const data = snap.val();
  if (!data) return;

  const now = Date.now() / 1000;

  const weekLabels = [];
  const weekTemps = [];

  const monthLabels = [];
  const monthTemps = [];

  const yearLabels = [];
  const yearTemps = [];

  const windLabels = [];
  const windValues = [];

  const rainLabels = [];
  const rainValues = [];

  const windDirValues = [];

  for (const k in data) {
    const e = data[k];
    const age = now - e.ts;
    const date = new Date(e.ts * 1000);

    if (age <= 7 * 86400) {
      weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
      weekTemps.push(e.temp);
    }

    if (age <= 30 * 86400) {
      monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
      monthTemps.push(e.temp);
    }

    if (age <= 365 * 86400) {
      yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
      yearTemps.push(e.temp);
    }

    windLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    windValues.push(e.wind);

    rainLabels.push(date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }));
    rainValues.push(e.rain);

    windDirValues.push(e.winddir);
  }

  drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
  drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
  drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");

  drawChart("windChart", windLabels, windValues, "Wind (km/h)");
  drawChart("rainChart", rainLabels, rainValues, "Regen (mm)");

  drawWindRose(windDirValues);
});


// --------------------------------------------------
// WINDROSE
// --------------------------------------------------
function drawWindRose(windDirections) {
  const counts = new Array(8).fill(0);

  windDirections.forEach(dir => {
    const index = Math.floor((dir % 360) / 45);
    counts[index]++;
  });

  new Chart(document.getElementById("windRose"), {
    type: "polarArea",
    data: {
      labels: ["N","NO","O","SO","S","SW","W","NW"],
      datasets: [{
        data: counts,
        backgroundColor: [
          "#4ea3ff","#6ec6ff","#ffd966","#ff8c42",
          "#ff4d4d","#d9534f","#5bc0de","#5cb85c"
        ]
      }]
    },
    options: {
      scales: { r: { ticks: { color: "#e6edf3" } } },
      plugins: { legend: { labels: { color: "#e6edf3" } } }
    }
  });
}


// --------------------------------------------------
// START
// --------------------------------------------------
window.onload = function() {
  loadLive();
};
</script>

</body>
</html>
