<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterstation – Stuben Martin Huber</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    padding: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #6ec6ff 0%, #2a66c7 40%, #0a1a33 100%);
    padding: 35px 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    color: white;
    text-align: center;
}

.header-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
.header-temp { font-size: 48px; font-weight: bold; margin-bottom: 10px; }
.header-details { font-size: 18px; margin-bottom: 5px; }
.header-time { font-size: 16px; margin-bottom: 10px; }

/* STATISTIK BOX */
.box {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* FORECAST */
.forecast-container {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.forecast-box {
    background: #161b22;
    padding: 10px;
    border-radius: 10px;
    width: 80px;
    text-align: center;
}

/* CHARTS */
canvas {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">Wetterstation – Stuben Martin Huber</div>
    <div class="header-temp" id="temp">--.- °C</div>
    <div class="header-details" id="details">Feuchte: -- %   Druck: ---- hPa</div>
    <div class="header-time" id="time">Stand: --:--</div>
</div>

<!-- STATISTIK -->
<div class="box">
    <h2>Verlauf / Statistik</h2>
    <div>Woche (Ø Temp): <span id="avg-week">--.- °C</span></div>
    <div>Monat (Ø Temp): <span id="avg-month">--.- °C</span></div>
    <div>Jahr (Ø Temp): <span id="avg-year">--.- °C</span></div>

    <br>

    <div>Sonnenaufgang: <span id="sunrise">--:--</span></div>
    <div>Sonnenuntergang: <span id="sunset">--:--</span></div>
</div>

<!-- FORECAST -->
<h2>Vorhersage (5 Stunden)</h2>
<div class="forecast-container" id="forecast"></div>

<!-- CHARTS -->
<h2>Wochenverlauf</h2>
<canvas id="weekChart"></canvas>

<h2>Monatsverlauf</h2>
<canvas id="monthChart"></canvas>

<h2>Jahresverlauf</h2>
<canvas id="yearChart"></canvas>

<script>
// --------------------------------------------------
// FIREBASE CONFIG
// --------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyApmjkGSrwrVlrhho77ruk7lL4gTcQAbFM",
  authDomain: "meine-wetterstation.firebaseapp.com",
  databaseURL: "https://meine-wetterstation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meine-wetterstation",
  storageBucket: "meine-wetterstation.firebasestorage.app",
  messagingSenderId: "593494014586",
  appId: "1:593494014586:web:cad0037363543e946059c3",
  measurementId: "G-139QB1TEMD"
};

firebase.initializeApp(firebaseConfig);

// --------------------------------------------------
// LIVE-DATEN
// --------------------------------------------------
function loadLive() {
    firebase.database().ref("weather/live").on("value", snap => {
        const d = snap.val();
        if (!d) return;

        document.getElementById("temp").innerText =
            (d.temp ?? "--.-").toFixed ? d.temp.toFixed(1) + " °C" : "--.- °C";

        const hum = typeof d.humidity === "number" ? d.humidity.toFixed(1) : "--";
        const press = typeof d.pressure === "number" ? d.pressure.toFixed(1) : "----";

        document.getElementById("details").innerText =
            `Feuchte: ${hum} %   Druck: ${press} hPa`;

        if (typeof d.timestamp === "number") {
            const t = new Date(d.timestamp * 1000);
            document.getElementById("time").innerText =
                "Stand: " + t.toLocaleTimeString("de-DE", {
                    hour: "2-digit",
                    minute: "2-digit"
                });
        }
    });
}

// --------------------------------------------------
// SONNE
// --------------------------------------------------
firebase.database().ref("weather/sun").on("value", snap => {
    const d = snap.val();
    if (!d) return;

    document.getElementById("sunrise").innerText =
        new Date(d.sunrise * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

    document.getElementById("sunset").innerText =
        new Date(d.sunset * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
});

// --------------------------------------------------
// STATISTIK (Woche / Monat / Jahr)
// --------------------------------------------------
firebase.database().ref("weather/history").on("value", snap => {
    const data = snap.val();
    if (!data) return;

    const now = Date.now() / 1000;

    const week = [];
    const month = [];
    const year = [];

    for (const k in data) {
        const e = data[k];
        const age = now - e.ts;

        if (age <= 7 * 86400) week.push(e.temp);
        if (age <= 30 * 86400) month.push(e.temp);
        if (age <= 365 * 86400) year.push(e.temp);
    }

    const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "--.-";

    document.getElementById("avg-week").innerText = avg(week) + " °C";
    document.getElementById("avg-month").innerText = avg(month) + " °C";
    document.getElementById("avg-year").innerText = avg(year) + " °C";
});

// --------------------------------------------------
// FORECAST (5h)
// --------------------------------------------------
firebase.database().ref("weather/forecast/5h").on("value", snap => {
    const arr = snap.val();
    if (!arr) return;

    const box = document.getElementById("forecast");
    box.innerHTML = "";

    arr.forEach(item => {
        const t = new Date(item.ts * 1000);
        const hour = t.getHours().toString().padStart(2, "0");

        box.innerHTML += `
            <div class="forecast-box">
                <img src="https://openweathermap.org/img/wn/${item.icon}.png">
                <div>${item.temp.toFixed(1)}°C</div>
                <div>${hour}:00</div>
            </div>
        `;
    });
});

// --------------------------------------------------
// CHART HELPER FUNCTIONS
// --------------------------------------------------
function linearRegression(yValues) {
    const n = yValues.length;
    if (n < 2) return null;

    const x = [...Array(n).keys()];
    const y = yValues;

    const sumX = x.reduce((a,b)=>a+b,0);
    const sumY = y.reduce((a,b)=>a+b,0);
    const sumXY = x.reduce((a,b,i)=>a + b * y[i], 0);
    const sumXX = x.reduce((a,b)=>a + b*b, 0);

    const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
    const intercept = (sumY - slope * sumX) / n;

    return x.map(i => slope * i + intercept);
}

function minLine(values) {
    const min = Math.min(...values);
    return values.map(() => min);
}

function tempColor(temp) {
    if (temp <= 0) return "#4ea3ff";
    if (temp <= 10) return "#6ec6ff";
    if (temp <= 20) return "#ffd966";
    if (temp <= 30) return "#ff8c42";
    return "#ff4d4d";
}

// --------------------------------------------------
// DRAW CHART
// --------------------------------------------------
function drawChart(id, labels, data, title) {
    const ctx = document.getElementById(id);

    const trend = linearRegression(data);
    const minL = minLine(data);
    const colors = data.map(t => tempColor(t));

    new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [
                {
                    label: title,
                    data,
                    borderColor: "#ffffff",
                    backgroundColor: "rgba(255,255,255,0.1)",
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: colors,
                    pointBorderColor: colors
                },
                {
                    label: "Trend",
                    data: trend,
                    borderColor: "#00ff88",
                    borderWidth: 2,
                    borderDash: [6, 6],
                    pointRadius: 0,
                    tension: 0.3
                },
                {
                    label: "Minimum",
                    data: minL,
                    borderColor: "#ff4444",
                    borderWidth: 1,
                    borderDash: [4, 4],
                    pointRadius: 0,
                    tension: 0
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: "#ccc" } }
            },
            scales: {
                x: { ticks: { color: "#ccc" } },
                y: { ticks: { color: "#ccc" } }
            }
        }
    });
}

// --------------------------------------------------
// HISTORY → CHARTS
// --------------------------------------------------
firebase.database().ref("weather/history").on("value", snap => {
    const data = snap.val();
    if (!data) return;

    const now = Date.now() / 1000;

    const weekLabels = [];
    const weekTemps = [];

    const monthLabels = [];
    const monthTemps = [];

    const yearLabels = [];
    const yearTemps = [];

    for (const k in data) {
        const e = data[k];
        const age = now - e.ts;
        const date = new Date(e.ts * 1000);

        if (age <= 7 * 86400) {
            weekLabels.push(date.toLocaleDateString("de-DE", { weekday: "short", hour: "2-digit" }));
            weekTemps.push(e.temp);
        }

        if (age <= 30 * 86400) {
            monthLabels.push(date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }));
            monthTemps.push(e.temp);
        }

        if (age <= 365 * 86400) {
            yearLabels.push(date.toLocaleDateString("de-DE", { month: "short" }));
            yearTemps.push(e.temp);
        }
    }

    drawChart("weekChart", weekLabels, weekTemps, "Wochentemperatur");
    drawChart("monthChart", monthLabels, monthTemps, "Monatstemperatur");
    drawChart("yearChart", yearLabels, yearTemps, "Jahrestemperatur");
});

// --------------------------------------------------
// START
// --------------------------------------------------
window.onload = function() {
    loadLive();
};
</script>

</body>
</html>
